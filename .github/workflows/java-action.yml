name: Java Action
on:
  schedule:
    - cron: '0 12 1 * *'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 21
        uses: actions/setup-java@v1
        with:
          java-version: 21
          distribution: 'adopt'
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Run Java Application
        run: java -jar target/april-github-star-list-jar-with-dependencies.jar
      - name: Commit and Push changes
        run: |
          git config --local user.email "davidyang0168@gmail.com"
          git config --local user.name "davidyang0168"
          git add Repo.md api.json README.md
          git diff-index --quiet HEAD || git commit -m ":sparkles: Update generated Repo.md and api.json"
          git push origin main
