<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Star List</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #1f2328;
            --text-sub: #636c76;
            --border-color: #d0d7de;
            --primary-color: #0969da;
            --star-color: #e3b341;
            --shadow: 0 3px 6px rgba(140, 149, 159, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
        }

        /* 搜索框与筛选 */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--card-bg);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }

        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* 列表卡片网格 */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .repo-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .repo-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .repo-title a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .repo-title a:hover {
            text-decoration: underline;
        }

        .repo-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 1rem;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-sub);
            border-top: 1px solid #f0f0f0;
            padding-top: 0.75rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .star-icon {
            color: var(--star-color);
        }

        .loading, .no-result {
            text-align: center;
            padding: 3rem;
            color: var(--text-sub);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 My GitHub Starred Repos</h1>
        <p>自动同步与搜索收藏的 GitHub 优秀开源项目</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索仓库名称、描述或语言..." oninput="filterRepos()">
        </div>
    </div>

    <div class="stats-bar">
        <span>共找到 <strong id="repoCount">0</strong> 个项目</span>
    </div>

    <div class="repo-grid" id="repoGrid">
        <div class="loading">正在加载仓库数据...</div>
    </div>
</div>

<script>
    let allRepos = [];

    // 从 api.json 获取数据
    async function loadRepos() {
        const grid = document.getElementById('repoGrid');
        try {
            const response = await fetch('./api.json');
            if (!response.ok) throw new Error('网络响应异常');
            
            allRepos = await response.json();
            renderRepos(allRepos);
        } catch (error) {
            console.error('加载 api.json 失败:', error);
            grid.innerHTML = `<div class="no-result">⚠️ 无法加载 api.json 文件，请检查文件是否存在。</div>`;
        }
    }

    // 渲染仓库卡片列表
    function renderRepos(repos) {
        const grid = document.getElementById('repoGrid');
        const countEl = document.getElementById('repoCount');
        
        countEl.textContent = repos.length;

        if (repos.length === 0) {
            grid.innerHTML = `<div class="no-result">🔍 未找到匹配的仓库项目</div>`;
            return;
        }

        grid.innerHTML = repos.map(repo => {
            const name = repo.name || '未命名仓库';
            const url = repo.url || repo.html_url || '#';
            const description = repo.description || '暂无描述';
            const language = repo.language || '未知语言';
            const stars = repo.stargazers_count ?? repo.stars ?? 0;

            return `
                <div class="repo-card">
                    <div>
                        <div class="repo-title">
                            <a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a>
                        </div>
                        <div class="repo-desc" title="${description}">${description}</div>
                    </div>
                    <div class="repo-meta">
                        <span class="meta-item">
                            <span class="star-icon">★</span> ${stars}
                        </span>
                        <span class="meta-item">
                            🏷️ ${language}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 实时搜索过滤
    function filterRepos() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        
        const filtered = allRepos.filter(repo => {
            const name = (repo.name || '').toLowerCase();
            const desc = (repo.description || '').toLowerCase();
            const lang = (repo.language || '').toLowerCase();

            return name.includes(query) || desc.includes(query) || lang.includes(query);
        });

        renderRepos(filtered);
    }

    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', loadRepos);
</script>

</body>
</html>
