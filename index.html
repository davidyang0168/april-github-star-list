<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Star List</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #1f2328;
            --text-sub: #636c76;
            --border-color: #d0d7de;
            --primary-color: #0969da;
            --star-color: #e3b341;
            --shadow: 0 3px 6px rgba(140, 149, 159, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
        }

        /* 搜索框与统计 */
        .controls {
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.85rem 1.25rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--card-bg);
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
        }

        .stats-bar {
            margin-bottom: 1.25rem;
            color: var(--text-sub);
            font-size: 0.95rem;
            padding: 0 0.25rem;
        }

        /* 列表卡片网格 */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .repo-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .repo-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: #0969da44;
        }

        .repo-main {
            flex-grow: 1; /* 让内容撑开顶部空间，底栏自然靠底 */
            margin-bottom: 1rem;
        }

        .repo-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            word-break: break-all;
        }

        .repo-title a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .repo-title a:hover {
            text-decoration: underline;
        }

        /* ✨ 完整显示描述文本，自动换行不截断 */
        .repo-desc {
            font-size: 0.92rem;
            color: var(--text-main);
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }

        /* ✨ 卡片底部元信息栏 */
        .repo-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.88rem;
            color: var(--text-sub);
            border-top: 1px solid #f0f0f0;
            padding-top: 0.85rem;
            margin-top: auto;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .star-icon {
            color: var(--star-color);
            font-size: 1rem;
        }

        .lang-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .loading, .no-result {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-sub);
            font-size: 1.1rem;
            grid-column: 1 / -1;
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 My GitHub Starred Repos</h1>
        <p>自动同步与实时搜索收藏的 GitHub 开源项目</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索仓库名称、描述或语言 (如: Java, AI, Rust)..." oninput="filterRepos()">
        </div>
    </div>

    <div class="stats-bar">
        共找到 <strong id="repoCount">0</strong> 个项目
    </div>

    <div class="repo-grid" id="repoGrid">
        <div class="loading">正在加载仓库数据...</div>
    </div>
</div>

<script>
    let allRepos = [];

    // 部分语言标记颜色
    const langColors = {
        'Java': '#b07219',
        'Python': '#3572A5',
        'JavaScript': '#f1e05a',
        'TypeScript': '#3178c6',
        'Go': '#00ADD8',
        'Rust': '#dea584',
        'C++': '#f34b7d',
        'Kotlin': '#A97BFF',
        'Shell': '#89e051',
        'Vue': '#41b883'
    };

    async function loadRepos() {
        const grid = document.getElementById('repoGrid');
        try {
            const response = await fetch('./api.json');
            if (!response.ok) throw new Error('无法读取 api.json');
            
            const rawData = await response.json();
            
            // 数据解析与字段匹配
            allRepos = rawData.map(repo => ({
                name: repo.name || 'Untitled',
                // ✨ 跳转链接字段匹配：优先使用 htmlUrl，其次是 url / html_url
                url: repo.htmlUrl || repo.html_url || repo.url || '#',
                // ✨ 关键修复：读取 api.json 中的 stargazersCount 字段
                stars: repo.stargazersCount ?? repo.stargazers_count ?? repo.stars ?? 0,
                description: repo.description || '暂无描述信息',
                language: repo.language || 'Other'
            }));

            // 默认按 Star 数量降序排序
            allRepos.sort((a, b) => b.stars - a.stars);

            renderRepos(allRepos);
        } catch (error) {
            console.error('加载 api.json 失败:', error);
            grid.innerHTML = `<div class="no-result">⚠️ 加载失败，请确保根目录包含正确的 <strong>api.json</strong> 文件。</div>`;
        }
    }

    function renderRepos(repos) {
        const grid = document.getElementById('repoGrid');
        const countEl = document.getElementById('repoCount');
        
        countEl.textContent = repos.length;

        if (repos.length === 0) {
            grid.innerHTML = `<div class="no-result">🔍 未找到匹配的开源项目</div>`;
            return;
        }

        grid.innerHTML = repos.map(repo => {
            const color = langColors[repo.language] || '#ccc';

            return `
                <div class="repo-card">
                    <div class="repo-main">
                        <div class="repo-title">
                            <a href="${repo.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(repo.name)}</a>
                        </div>
                        <div class="repo-desc">${escapeHtml(repo.description)}</div>
                    </div>
                    <div class="repo-meta">
                        <div class="meta-item">
                            <span class="lang-color" style="background-color: ${color}"></span>
                            ${escapeHtml(repo.language)}
                        </div>
                        <div class="meta-item">
                            <span class="star-icon">★</span> ${repo.stars.toLocaleString()}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[<>&"']/g, m => ({
            '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#039;'
        }[m]));
    }

    function filterRepos() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        
        const filtered = allRepos.filter(repo => {
            return repo.name.toLowerCase().includes(query) || 
                   repo.description.toLowerCase().includes(query) || 
                   repo.language.toLowerCase().includes(query);
        });

        renderRepos(filtered);
    }

    document.addEventListener('DOMContentLoaded', loadRepos);
</script>

</body>
</html>
