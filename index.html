<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Star 项目列表</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --border-color: #d0d7de;
            --accent-color: #0969da;
            --accent-hover: #044289;
            --shadow: 0 3px 6px rgba(140, 149, 159, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* 搜索框与工具栏 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 280px;
            padding: 10px 16px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 项目卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card-header {
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            word-break: break-all;
        }

        .card-title:hover {
            text-decoration: underline;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .tag {
            background-color: #ddf4ff;
            color: #0969da;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .empty-tip {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⭐ GitHub Star 收藏夹</h1>
        <p>个人 Star 仓库备份与快捷检索页面</p>
    </header>

    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 输入关键词搜索项目名称或描述..." oninput="filterData()">
    </div>

    <div class="stats-bar">
        <span>当前展示：<strong id="visibleCount">0</strong> 个项目</span>
        <span>总计：<span id="totalCount">0</span></span>
    </div>

    <div class="grid" id="projectGrid">
        <!-- 项目卡片将通过 JavaScript 动态渲染 -->
    </div>
</div>

<script>
    let allData = [];

    // 默认演示备用数据（防止本地没有 api.json 无法展示）
    const fallbackData = [
        {
            name: "davidyang0168/april-github-star-list",
            url: "https://github.com/davidyang0168/april-github-star-list",
            description: "GitHub Star 列表生成与自动备份工具",
            language: "Java",
            stars: 18
        }
    ];

    // 初始化加载数据
    async function loadData() {
        try {
            const response = await fetch('./api.json');
            if (!response.ok) throw new Error('网络响应异常');
            allData = await response.json();
        } catch (error) {
            console.warn('未成功读取 api.json，已加载默认数据:', error);
            allData = fallbackData;
        }
        
        document.getElementById('totalCount').textContent = allData.length;
        renderCards(allData);
    }

    // 渲染卡片
    function renderCards(dataList) {
        const grid = document.getElementById('projectGrid');
        const visibleCount = document.getElementById('visibleCount');
        grid.innerHTML = '';
        visibleCount.textContent = dataList.length;

        if (dataList.length === 0) {
            grid.innerHTML = `<div class="empty-tip">未找到与搜索条件匹配的项目</div>`;
            return;
        }

        dataList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 处理字段容错
            const title = item.name || item.title || '未命名项目';
            const url = item.url || item.html_url || '#';
            const desc = item.description || item.desc || '暂无描述信息';
            const lang = item.language || 'Code';
            const stars = item.stars || item.stargazers_count || 0;

            card.innerHTML = `
                <div class="card-header">
                    <a href="${url}" target="_blank" class="card-title">${escapeHtml(title)}</a>
                    <p class="card-desc" title="${escapeHtml(desc)}">${escapeHtml(desc)}</p>
                </div>
                <div class="card-footer">
                    <span class="tag">${escapeHtml(lang)}</span>
                    <span>⭐ ${stars}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 实时搜索过滤
    function filterData() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (!query) {
            renderCards(allData);
            return;
        }

        const filtered = allData.filter(item => {
            const name = (item.name || item.title || '').toLowerCase();
            const desc = (item.description || item.desc || '').toLowerCase();
            return name.includes(query) || desc.includes(query);
        });

        renderCards(filtered);
    }

    // 简单的 HTML 转义防 XSS
    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // 页面加载后执行
    document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
